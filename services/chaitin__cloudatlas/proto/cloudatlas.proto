syntax = "proto3";

package CloudAtlas;

option go_package = "miner/grpc-service/CloudAtlas";

import "google/protobuf/wrappers.proto";
import "google/protobuf/struct.proto";

// ============================================================
// CloudAtlas Service
// ============================================================

service CloudAtlas {

  // --- Seed (11 methods) ---

  rpc ListEnterpriseSubjects(ListEnterpriseSubjectsRequest) returns (ListEnterpriseSubjectsResponse);
  rpc BatchCreateEnterpriseSubjects(BatchCreateEnterpriseSubjectsRequest) returns (BatchCreateEnterpriseSubjectsResponse);
  rpc BatchDeleteEnterpriseSubjects(BatchDeleteEnterpriseSubjectsRequest) returns (BatchDeleteEnterpriseSubjectsResponse);
  rpc ListKeywords(ListKeywordsRequest) returns (ListKeywordsResponse);
  rpc BatchCreateKeywords(BatchCreateKeywordsRequest) returns (BatchCreateKeywordsResponse);
  rpc ListSeedDomains(ListSeedDomainsRequest) returns (ListSeedDomainsResponse);
  rpc BatchCreateSeedDomains(BatchCreateSeedDomainsRequest) returns (BatchCreateSeedDomainsResponse);
  rpc ListSeedCerts(ListSeedCertsRequest) returns (ListSeedCertsResponse);
  rpc ListSeedIcons(ListSeedIconsRequest) returns (ListSeedIconsResponse);
  rpc ListSeedWebTitles(ListSeedWebTitlesRequest) returns (ListSeedWebTitlesResponse);
  rpc BatchUpdateSeeds(BatchUpdateSeedsRequest) returns (BatchUpdateSeedsResponse);

  // --- Asset (9 methods) ---

  rpc ListRootDomains(ListRootDomainsRequest) returns (ListRootDomainsResponse);
  rpc BatchCreateRootDomains(BatchCreateRootDomainsRequest) returns (BatchCreateRootDomainsResponse);
  rpc ListSubdomains(ListSubdomainsRequest) returns (ListSubdomainsResponse);
  rpc ListDNS(ListDNSRequest) returns (ListDNSResponse);
  rpc ListIPs(ListIPsRequest) returns (ListIPsResponse);
  rpc BatchCreateIPs(BatchCreateIPsRequest) returns (BatchCreateIPsResponse);
  rpc ListAssetCerts(ListAssetCertsRequest) returns (ListAssetCertsResponse);
  rpc BatchUpdateAssetStatus(BatchUpdateAssetStatusRequest) returns (BatchUpdateAssetStatusResponse);
  rpc BatchDeleteAssets(BatchDeleteAssetsRequest) returns (BatchDeleteAssetsResponse);

  // --- Attack Surface (6 methods) ---

  rpc ListPorts(ListPortsRequest) returns (ListPortsResponse);
  rpc ListOpenPorts(ListOpenPortsRequest) returns (ListOpenPortsResponse);
  rpc ListWebEntities(ListWebEntitiesRequest) returns (ListWebEntitiesResponse);
  rpc ListWebPaths(ListWebPathsRequest) returns (ListWebPathsResponse);
  rpc ListWebFingerprints(ListWebFingerprintsRequest) returns (ListWebFingerprintsResponse);
  rpc ListCrawlerData(ListCrawlerDataRequest) returns (ListCrawlerDataResponse);

  // --- Risk (5 methods) ---

  rpc ListVulnerabilities(ListVulnerabilitiesRequest) returns (ListVulnerabilitiesResponse);
  rpc BatchUpdateVulnStatus(BatchUpdateVulnStatusRequest) returns (BatchUpdateVulnStatusResponse);
  rpc ListHighRiskApps(ListHighRiskAppsRequest) returns (ListHighRiskAppsResponse);
  rpc GetHighRiskAppFingers(GetHighRiskAppFingersRequest) returns (GetHighRiskAppFingersResponse);
  rpc ListHighRiskServices(ListHighRiskServicesRequest) returns (ListHighRiskServicesResponse);

  // --- KB (4 methods) ---

  rpc ListVendors(ListVendorsRequest) returns (ListVendorsResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc ListVulnSubjects(ListVulnSubjectsRequest) returns (ListVulnSubjectsResponse);
  rpc ListKBVulns(ListKBVulnsRequest) returns (ListKBVulnsResponse);

  // --- DRPS (10 methods) ---

  rpc ListMonitoringRules(ListMonitoringRulesRequest) returns (ListMonitoringRulesResponse);
  rpc BatchCreateMonitoringRules(BatchCreateMonitoringRulesRequest) returns (BatchCreateMonitoringRulesResponse);
  rpc ListGithubLeaks(ListGithubLeaksRequest) returns (ListGithubLeaksResponse);
  rpc ListDiskLeaks(ListDiskLeaksRequest) returns (ListDiskLeaksResponse);
  rpc ListDocLeaks(ListDocLeaksRequest) returns (ListDocLeaksResponse);
  rpc ListDarknetIntel(ListDarknetIntelRequest) returns (ListDarknetIntelResponse);
  rpc ListStolenData(ListStolenDataRequest) returns (ListStolenDataResponse);
  rpc ListEmailLeaks(ListEmailLeaksRequest) returns (ListEmailLeaksResponse);
  rpc ListMobileApps(ListMobileAppsRequest) returns (ListMobileAppsResponse);
  rpc ListSocialMedia(ListSocialMediaRequest) returns (ListSocialMediaResponse);

  // --- Task (4 methods) ---

  rpc ListTaskSchedules(ListTaskSchedulesRequest) returns (ListTaskSchedulesResponse);
  rpc CreateTaskSchedule(CreateTaskScheduleRequest) returns (CreateTaskScheduleResponse);
  rpc ListTaskInstances(ListTaskInstancesRequest) returns (ListTaskInstancesResponse);
  rpc CreateTaskInstance(CreateTaskInstanceRequest) returns (CreateTaskInstanceResponse);

  // --- Space (3 methods) ---

  rpc ListSpaces(ListSpacesRequest) returns (ListSpacesResponse);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc ListBusinessUnits(ListBusinessUnitsRequest) returns (ListBusinessUnitsResponse);
}

